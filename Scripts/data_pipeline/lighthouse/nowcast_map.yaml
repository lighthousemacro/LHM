  - horizon_column: JOLTS_Quits_Rate
    construct: Job quits rate, total nonfarm
    pillar: 1
    raw_series_id: JTSQUR
    raw_cadence: monthly
    external_nowcast: null  # No Fed nowcast exists for quits
    proxy_daily: ICSA, CCSA, Indeed_Job_Postings (when available)
    nowcast_strategy: proxy_regression
    confidence: medium
    notes: Quits is the "truth serum" of the framework. Build regression vs initial claims + continuing claims, both daily/weekly. Cross-check against Indeed series if subscribed.

  - horizon_column: JOLTS_Hires_Rate
