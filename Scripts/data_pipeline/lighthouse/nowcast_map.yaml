# LHM Nowcast Map (Layer 1)
# ============================
# Every monthly/quarterly horizon_dataset column feeding the proprietary
# indicators is mapped to (a) its best public real-time nowcast, and
# (b) its best high-frequency proxy. Layer 2 (LHM modeling) consumes Layer 1
# outputs. See feedback_indicators_are_nowcasts memory for the rule.
#
# Fields per entry:
#   horizon_column:       column name as compute_indices.py expects it
#   construct:            what this column is measuring (plain English)
#   pillar:               1-12 (or "cross" for cross-pillar)
#   raw_series_id:        source series in observations table
#   raw_cadence:          daily | weekly | monthly | quarterly
#   external_nowcast:     FRED/Fed nowcast series (preferred when it exists)
#   proxy_daily:          best high-frequency proxy
#   nowcast_strategy:     external | proxy_regression | proxy_carry | model | none
#   confidence:           high | medium | low | tbd
#   notes:                anything weird about this input
#
# Status legend in nowcast_strategy:
#   external             — use the external nowcast series directly
#   proxy_regression     — model raw_series_id ~ proxy_daily (lead-lag regression)
#   proxy_carry          — carry last raw print, but flag proxy direction as a sanity overlay
#   model                — pure time-series (ARIMA / state-space) when no proxy fits
#   none                 — daily-cadence already, no nowcast needed
#
# Phase 1 ships when every monthly/quarterly entry has a real strategy
# (no "tbd" rows survive). Phase 2 adds confidence intervals + vintage tracking.

version: 0.1.0
last_updated: 2026-05-14

inputs:

