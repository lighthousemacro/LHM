<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Lighthouse Macro">
  <!-- background -->
  <rect x="0" y="0" width="512" height="512" rx="16" fill="#123456"/>
  <!-- inner border frame -->
  <rect x="22" y="22" width="468" height="468" rx="10" fill="none" stroke="#2C5485" stroke-width="10"/>

  <!-- light beams (bowtie), pinched at the lamp -->
  <polygon points="256,152 84,84 84,220" fill="#2389BB"/>
  <polygon points="256,152 428,84 428,220" fill="#C2682F"/>

  <!-- lighthouse tower (bright sky #89CCFF) -->
  <polygon points="240,98 272,98 298,384 214,384" fill="#89CCFF"/>

  <!-- lamp -->
  <circle cx="256" cy="152" r="31" fill="#FFFFFF"/>

  <!-- base -->
  <rect x="204" y="384" width="104" height="32" rx="3" fill="#FFFFFF"/>
</svg>
